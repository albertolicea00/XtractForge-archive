name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Allow the workflow to create the GitHub Release and upload artifacts
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            flag: --mac
          - os: windows-latest
            flag: --win
          - os: ubuntu-latest
            flag: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm build

      - name: Package + publish to GitHub Release
        run: pnpm exec electron-builder ${{ matrix.flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple/Windows signing certs configured yet — build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: false
